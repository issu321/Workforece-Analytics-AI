{% extends "layout.html" %}
{% block title %}Login - WorkforceAI{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card glass">
        <div class="auth-header">
            <div class="auth-logo"><i class="fas fa-brain"></i></div>
            <h2>Welcome Back</h2>
            <p>Sign in to your WorkforceAI account</p>
        </div>
        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-glow">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
            <p class="demo-creds">Default: admin / admin123</p>
        </div>
    </div>
</div>
<script>
function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
{% endblock %}
